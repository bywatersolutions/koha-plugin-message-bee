name: CI
on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  schedule:
    - cron: "0 6 * * *"
jobs:
  unit_tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        koha-version: [main, stable, oldstable]

    steps:
    - name: Checkout plugin code
      uses: actions/checkout@v4

    - name: Get Koha Version Branch Name
      id: koha-version
      uses: "bywatersolutions/github-action-koha-get-version-by-label@v2"
      with:
        version-label: "${{ matrix.koha-version }}"

    - name: Set up environment variables
      run: |
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        GITHUB_REPO="${parts[1]}"
        echo "GITHUB_REPO=$GITHUB_REPO" >> $GITHUB_ENV
        echo "KOHA_BRANCH=${{ steps.koha-version.outputs.current-branch-name }}" >> $GITHUB_ENV
        echo "PLUGINS_DIR=$(pwd)/.." >> $GITHUB_ENV
        echo "SYNC_REPO=$(pwd)/../kohaclone" >> $GITHUB_ENV

    - name: Check out Koha
      run: |
        cd ..
        git clone --branch ${{ env.KOHA_BRANCH }} --single-branch --depth 1 https://github.com/Koha-Community/Koha.git kohaclone

    - name: Skip if this Koha lacks Koha::File::Transport
      id: support_check
      run: |
        if [ -f "$SYNC_REPO/Koha/File/Transport.pm" ]; then
          echo "supported=true" >> "$GITHUB_OUTPUT"
        else
          echo "supported=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Koha::File::Transport not present in ${{ env.KOHA_BRANCH }}, skipping plugin tests"
        fi

    - name: Install koha-testing-docker
      if: steps.support_check.outputs.supported == 'true'
      run: |
        cd ..
        git clone https://gitlab.com/koha-community/koha-testing-docker.git
        cd koha-testing-docker
        cp env/defaults.env .env
        echo "$(pwd)/bin" >> $GITHUB_PATH

    - name: Launch KTD instance with plugins support
      if: steps.support_check.outputs.supported == 'true'
      run: |
        cd ../koha-testing-docker
        export LOCAL_USER_ID=$(id -u)
        export KTD_HOME=$(pwd)
        if [ "${{ matrix.koha-version }}" = "main" ]; then
          export KOHA_IMAGE=main
        else
          export KOHA_IMAGE=${{ steps.koha-version.outputs.version-major-minor }}
        fi
        ktd --name messagebee --plugins up -d

    - name: Wait for KTD to be ready
      if: steps.support_check.outputs.supported == 'true'
      run: |
        cd ../koha-testing-docker
        export KTD_HOME=$(pwd)
        ktd --name messagebee --wait-ready 500

    - name: Start SFTP server for the live upload test
      if: steps.support_check.outputs.supported == 'true'
      run: |
        # Attach an SFTP server to the same Docker network as the KTD koha
        # container so the test can reach it by hostname. atmoz/sftp creates
        # user 'foo' (password 'pass') with a writable 'upload' directory.
        SFTP_NET=$(docker inspect messagebee-koha-1 \
          -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' \
          | tr ' ' '\n' | grep -v '^proxy$' | grep . | head -1)
        echo "Using Docker network: $SFTP_NET"
        docker run -d --name msgbee_sftp --network "$SFTP_NET" atmoz/sftp foo:pass:::upload
        for i in $(seq 1 30); do
          docker logs msgbee_sftp 2>&1 | grep -q "Server listening on 0.0.0.0 port 22" && break
          sleep 1
        done
        docker logs msgbee_sftp 2>&1 | tail -3

    - name: Run plugin tests
      if: steps.support_check.outputs.supported == 'true'
      run: |
        export KTD_HOME=$(pwd)/../koha-testing-docker
        ktd --name messagebee --shell --run "
          cd /kohadevbox/plugins/${{ env.GITHUB_REPO }} &&
          export PERL5LIB=\$PERL5LIB:.:/kohadevbox/koha/t/lib:/kohadevbox/koha/t/lib/plugins &&
          export MESSAGEBEE_TEST_SFTP_HOST=msgbee_sftp &&
          export MESSAGEBEE_TEST_SFTP_PORT=22 &&
          export MESSAGEBEE_TEST_SFTP_USER=foo &&
          export MESSAGEBEE_TEST_SFTP_PASSWORD=pass &&
          export MESSAGEBEE_TEST_SFTP_DIR=upload &&
          prove -v -r -s t/
        "

    - name: Show logs on failure
      if: ${{ failure() && steps.support_check.outputs.supported == 'true' }}
      run: |
        export KTD_HOME=$(pwd)/../koha-testing-docker
        echo "=== KTD instance status ==="
        ktd --name messagebee --list || true
        echo "=== Koha error logs ==="
        ktd --name messagebee --shell --run "tail -50 /var/log/koha/kohadev/plack-intranet-error.log" || true
        echo "=== Container logs ==="
        docker logs messagebee-koha-1 --tail 50 || true

    - name: Stop SFTP server
      if: ${{ always() && steps.support_check.outputs.supported == 'true' }}
      run: docker rm -f msgbee_sftp || true

    - name: Cleanup KTD instance
      if: ${{ always() && steps.support_check.outputs.supported == 'true' }}
      run: |
        export KTD_HOME=$(pwd)/../koha-testing-docker
        ktd --name messagebee down || true

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: unit_tests
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v1

    - name: Parse out and store the GitHub repository name
      id: myvars
      run: |
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        GITHUB_REPO="${parts[1]}"
        echo ::set-output name=github_repo::$GITHUB_REPO
        echo "GITHUB REPO: $GITHUB_REPO"

        TAG_VERSION="${GITHUB_REF##*/}"
        echo "TAG VERSION: $TAG_VERSION"
        TAG_VERSION="${TAG_VERSION:1}"
        echo "TAG VERSION 2: $TAG_VERSION"
        echo ::set-output name=tag_version::$TAG_VERSION

    - name: Get Koha Version Branch Name
      id: koha-version-oldstable
      uses: "bywatersolutions/github-action-koha-get-version-by-label@master"
      with:
        version-label: "oldstable"

    - name: Print minimum version
      run: |
        echo "Current oldstable version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}"

    - name: Dump myvars outputs
      env:
        GITHUB_CONTEXT: ${{ toJson(steps.myvars.outputs) }}
      run: echo "$GITHUB_CONTEXT"

    - name: Build Koha Plugin kpz artifact
      id: kpz
      uses: "bywatersolutions/github-action-koha-plugin-create-kpz@master"
      with:
        release-version: ${{ steps.myvars.outputs.tag_version }}
        release-name: ${{ steps.myvars.outputs.github_repo }}
        minimum-version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}
        plugin-module: "Koha/Plugin/Com/ByWaterSolutions/MessageBee.pm"

    - name: See if kpz was created
      run: |
        echo "FILENAME: ${{ steps.kpz.outputs.filename }}"
        ls -alh

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          ${{ steps.kpz.outputs.filename }}
          CHANGELOG.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  keepalive:
    name: Keep Alive
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check age and push commit if needed
      run: |
        LAST_COMMIT=$( git --no-pager log -1 --format=%ct )
        NOW=$(date +%s)
        DIFF=$(($NOW-$LAST_COMMIT))
        DAYS=$(($DIFF/86400))
        git config --global user.email kyle@bywatersolutions.com
        git config --global user.name "Kyle M Hall"
        git commit --allow-empty -m "Automated commit from keep alive workflow"
        if [ "$DAYS" -gt "50" ]; then git push; fi
